<!doctype html><html lang="en" data-theme="dark"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Hoodwise Ops</title><link rel="stylesheet" href="/shared.css"><link rel="stylesheet" href="/styles.css"><style>body{min-height:100vh;display:grid;place-items:center;padding:24px}.ops{width:min(920px,100%);padding:28px;border:1px solid rgba(128,255,180,.18);border-radius:20px;background:linear-gradient(145deg,rgba(12,39,25,.9),rgba(4,15,9,.94));box-shadow:0 28px 90px rgba(0,0,0,.35)}.ops-head{display:flex;justify-content:space-between;gap:16px;align-items:start;border-bottom:1px solid rgba(128,255,180,.14);padding-bottom:20px}.ops-kicker{color:#00e676;font:10px 'JetBrains Mono',monospace;letter-spacing:.14em}.ops h1{margin-top:8px;font:600 34px 'Space Grotesk',sans-serif}.ops p{color:#91b6a0}.ops-login{display:flex;gap:8px;margin-top:22px}.ops input{flex:1;min-width:0;padding:12px;border:1px solid var(--border);border-radius:8px;background:#07140d;color:#eaf7f0}.ops button{padding:12px 15px;border:0;border-radius:8px;background:#00e676;color:#052113;font-weight:700;cursor:pointer}.ops-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:22px}.ops-card{padding:18px;border:1px solid rgba(128,255,180,.14);border-radius:12px;background:rgba(0,0,0,.16)}.ops-card span{color:#8eb39c;font:9px 'JetBrains Mono',monospace;letter-spacing:.09em}.ops-card b{display:block;margin-top:10px;font:600 28px 'Space Grotesk',sans-serif}.ops-card small{display:block;margin-top:8px;color:#7da98e;font:10px 'JetBrains Mono',monospace;line-height:1.45}.ops-tools{display:flex;gap:8px;align-items:center}.ops-tools button:last-child{background:transparent;border:1px solid rgba(128,255,180,.24);color:#baffd3}.ops-status{margin-top:16px;font:11px 'JetBrains Mono',monospace;color:#9effcb}@media(max-width:620px){.ops{padding:20px}.ops-head{flex-direction:column}.ops-grid{grid-template-columns:1fr 1fr}.ops-login{flex-direction:column}.ops h1{font-size:28px}}</style></head><body><main class="ops"><div class="ops-head"><div><div class="ops-kicker">HOODWISE / INTERNAL OPS</div><h1>Production signal.</h1><p>Aggregate metrics only. No prompt or user data is shown.</p></div><div class="ops-tools"><button id="refresh">Refresh</button><button id="signout">Lock</button></div></div><section id="login"><div class="ops-login"><input id="token" type="password" autocomplete="off" placeholder="OPS dashboard token"><button id="unlock">Unlock dashboard</button></div></section><section id="dashboard" hidden><div class="ops-grid" id="grid"></div><div class="ops-status" id="status"></div></section></main><script src="/ops.js"></script></body></html>
